# Natural (inverted) scrolling for every pointer — mice included.
#
# The built-in touchpad gets natural scrolling from ~/.config/i3/scripts/touchpad.sh
# (which runs at i3 start), but a Bluetooth mouse connects AFTER login, so a
# start-time script can miss it on reconnect. This InputClass is applied by the X
# server the moment any pointer is added, so it survives BT disconnect/reconnect.
#
# Numbered 90- so it is read after the distro default (40-libinput.conf) and wins.
#
# Install (needs root):
#   sudo install -Dm644 ~/setup/xorg/90-natural-scrolling.conf \
#        /etc/X11/xorg.conf.d/90-natural-scrolling.conf
# Takes effect on the next device connect or X restart (log out / back in).

Section "InputClass"
    Identifier "Natural scrolling for pointers"
    MatchIsPointer "on"
    Driver "libinput"
    Option "NaturalScrolling" "true"
EndSection
