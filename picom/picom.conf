# picom.conf — minimal compositor config for i3/Xorg.
#
# Purpose: enable true window transparency so Alacritty's `opacity` (set in
# ~/.config/alacritty/alacritty.toml) actually blends with the wallpaper behind
# it. On X11 the terminal cannot do this alone — a compositor must be running.
#
# Deliberately minimal: no shadows, and fading only for the lock window (see
# below). That keeps it clean against i3's gaps and cheap on GPU/battery. Each
# app's own opacity is honored as-is.

backend = "glx";    # GPU-accelerated; falls back gracefully if glx is unavailable
vsync = true;       # avoid tearing

# Full-frame repaints. With the default (use-damage = true) the glx backend only
# redraws "damaged" regions, and on a ROTATED output those regions are
# miscomputed — so the wallpaper gets left "cut"/stale after a rotation or
# hotplug. Forcing full repaints fixes that. Costs a little more GPU per frame,
# negligible for this minimal config (no shadows; fading only on lock).
use-damage = false;

shadow = false;

# Fading is enabled ONLY for the lock window — everything else is excluded, so
# the desktop stays instant and minimal. Purpose: when a CORRECT password
# unlocks, i3lock's window is destroyed and fades out; the lock shader turns the
# orb green during that fade (its one reliable "success" signal). fade-in is
# instant (step 1.0) so *locking* never flashes green; fade-out is slow.
fading = true;
fade-exclude = [ "class_g != 'i3lock'" ];
fade-in-step = 1.0;
fade-out-step = 0.025;
fade-delta = 8;

# No opacity rules here on purpose — Alacritty sets its own (opacity = 0.8),
# and everything else stays fully opaque.

# Lock screen shader: render the i3lock(-color) window through the 3D-camera lock
# shader (spinning avatar + CRT). lock.sh shows lock-image.png via i3lock-color
# and, while locked, runs an animated compositor (--no-use-damage) so the shader
# advances every frame. Default unredir-if-possible is off, so the fullscreen
# locker stays composited. See README "Lock screen".
# NOTE: picom's libconfig does NOT expand ~ or env vars in paths, so this must be
# an absolute path. install.sh rewrites the leading $HOME to your real home dir
# when it copies this file into ~/.config/picom.conf.
window-shader-fg-rule = [
  "$HOME/.config/picom/shaders/lock.glsl:class_g = 'i3lock'"
];
