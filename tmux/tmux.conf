##### GENERAL SETTINGS #####
# Enable 256-color terminal and true color support
#set -g default-terminal "screen-256color"
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# Disable automatic window renaming
set-option -g automatic-rename off

# Set escape time for key sequences (lower is more responsive)
set-option -sg escape-time 10

# Enable focus events for better terminal integration
set-option -g focus-events on


##### PREFIX & KEYBINDINGS #####
# Use Ctrl-a as tmux prefix instead of default Ctrl-b
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# Reload config with 'prefix + r'
unbind r
bind r source-file ~/.tmux.conf


##### WINDOW & PANE SETTINGS #####
# Start window and pane numbering at 1
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# Split window shortcuts (| = horizontal, - = vertical)
unbind %
bind | split-window -h
unbind '"'
bind - split-window -v

# Pane resizing shortcuts (hold for repeat)
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
set-option -g repeat-time 500  # Allow repeats when holding keys

# Maximize/minimize current pane with 'm'
bind -r m resize-pane -Z

# (Optional) Clear buffer with Ctrl-l
# bind C-l send-keys 'C-l'


##### MOUSE & COPY MODE #####
# Enable mouse support (set to 'on' to activate)
set -g mouse on

# Copy mouse selection to system clipboard
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"

# (Optional) Use vim keybindings in copy mode
# set-window-option -g mode-keys vi
# bind-key -T copy-mode-vi 'v' send -X begin-selection  # Start selection with 'v'
# bind-key -T copy-mode-vi 'y' send -X copy-selection   # Copy selection with 'y'
# unbind -T copy-mode-vi MouseDragEnd1Pane              # Don't exit copy mode after mouse drag


##### PLUGIN MANAGEMENT #####
# --- Theme Plugins (uncomment to enable) ---
# set -g @plugin 'rose-pine/tmux'
# run-shell ~/.tmux/plugins/rose-pine-tmux/rose-pine.tmux
# set -g @plugin 'jimeh/tmux-themepack'
# set -g @plugin 'catppuccin/tmux#v2.1.3'

# --- Core Plugins ---
set -g @plugin 'tmux-plugins/tpm'              # Plugin manager
set -g @plugin 'tmux-plugins/tmux-sensible'    # Sensible defaults

# --- Session Persistence Plugins ---
set -g @plugin 'tmux-plugins/tmux-resurrect'   # Save/restore tmux sessions
set -g @plugin 'tmux-plugins/tmux-continuum'   # Auto-save tmux sessions

# --- Navigation Plugins (optional) ---
# set -g @plugin 'christoomey/vim-tmux-navigator'  # Seamless movement between vim and tmux


##### THEME & STATUS BAR #####
# --- Rose Pine Theme Options ---
set -g @rose_pine_variant 'moon'               # Options: 'main', 'moon', 'dawn'
set -g @rose_pine_host 'on'                    # Show hostname in status bar
set -g @rose_pine_bar_bg_disable 'on'          # Disable background color (for transparency)
set -g @rose_pine_bar_bg_disabled_color_option 'default' # Background color if disabled
set -g @rose_pine_default_window_behavior 'on' # Use tmux default window list

# --- (Optional) Additional Theme Options ---
# set -g @rose_pine_date_time '%a %b %d %I:%M %p' # Date/time format
# set -g @rose_pine_user 'on'                     # Show username in status bar
# set -g @rose_pine_directory 'on'                # Show current folder in status bar
# set -g @rose_pine_only_windows 'on'             # Only show windows module
# set -g @rose_pine_disable_active_window_menu 'off' # Disable active window menu
# set -g @rose_pine_show_current_program 'on'     # Show current running program as window name
# set -g @rose_pine_show_pane_directory 'on'      # Show current directory as window name

# --- Separators & Icons ---
set -g @rose_pine_left_separator ' > '
set -g @rose_pine_right_separator ' '
set -g @rose_pine_field_separator ' | '
set -g @rose_pine_window_separator ' - '
set -g @rose_pine_session_icon ''
set -g @rose_pine_current_window_icon ''
set -g @rose_pine_folder_icon ''
set -g @rose_pine_username_icon ''
set -g @rose_pine_hostname_icon '󰒋'
set -g @rose_pine_date_time_icon '󰃰'
set -g @rose_pine_window_status_separator "  "

# --- (Optional) Beta/Advanced Theme Options ---
# set -g @rose_pine_prioritize_windows 'on'
# set -g @rose_pine_width_to_hide '80'
# set -g @rose_pine_window_count '5'


##### PLUGIN OPTIONS #####
# tmux-resurrect: capture pane contents
set -g @resurrect-capture-pane-contents 'on'
# tmux-continuum: enable automatic restoration
set -g @continuum-restore 'on'


##### PLUGIN INITIALIZATION #####
# Initialize TMUX plugin manager (keep at end of file)
run-shell '~/.tmux/plugins/rose-pine-tmux/rose-pine.tmux'
run '~/.tmux/plugins/tpm/tpm'
