# i3 rotate mode — paste this block into ~/.config/i3/config (it is NOT applied
# automatically; the i3 config is hand-maintained). Triggered by $mod+o.
#
# "auto" targets the first connected non-primary output (the external). Arrow =
# orientation: Up=upright, Down=upside-down, Left/Right=portrait. rotate.sh
# re-tiles all monitors and re-applies wallpaper + polybar for the new geometry,
# which a bare `xrandr --rotate` does not.
#
# $mod is Mod4 (Super). $mod+o was free; rebind if it clashes with your config.

mode "rotate" {
        bindsym Up     exec --no-startup-id ~/.config/i3/scripts/rotate.sh auto normal,   mode "default"
        bindsym Down   exec --no-startup-id ~/.config/i3/scripts/rotate.sh auto inverted, mode "default"
        bindsym Left   exec --no-startup-id ~/.config/i3/scripts/rotate.sh auto left,     mode "default"
        bindsym Right  exec --no-startup-id ~/.config/i3/scripts/rotate.sh auto right,    mode "default"

        bindsym Return mode "default"
        bindsym Escape mode "default"
        bindsym $mod+o mode "default"
}
bindsym $mod+o mode "rotate"
