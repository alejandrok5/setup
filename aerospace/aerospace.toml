# AeroSpace — i3-style tiling WM for macOS.  ->  ~/.config/aerospace/aerospace.toml
# Docs: https://nikitabobko.github.io/AeroSpace/guide
#
# $mod is Option (alt): Cmd is reserved for macOS app shortcuts, so AeroSpace
# binds live on alt to avoid clobbering them. App launcher is native Spotlight
# (cmd-space) — there's no launcher bind here on purpose.
#
# NOTE: a few terminal apps (e.g. LazyVim's <A-h/j/k/l> term toggles) use Alt too;
# AeroSpace grabs alt globally and wins. Remap either side if they collide.

start-at-login = true

# i3-like tiling defaults.
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Keep the mauve focus border (JankyBorders) running alongside AeroSpace.
after-startup-command = ['exec-and-forget borders']

# Gaps (the menu bar handles top clearance natively).
[gaps]
inner.horizontal = 8
inner.vertical   = 8
outer.left       = 8
outer.right      = 8
outer.top        = 8
outer.bottom     = 8

# Pin Spotify to workspace 10  (i3: assign [class="Spotify"] number 10).
[[on-window-detected]]
if.app-id = 'com.spotify.client'
run = 'move-node-to-workspace 10'

[mode.main.binding]
# launch terminal  (i3: $mod+Enter)
alt-enter = 'exec-and-forget open -na Alacritty'

# close focused window  (i3: $mod+Shift+q) — macOS cmd-w/cmd-q also work
alt-shift-q = 'close'

# focus / move  (i3: $mod+hjkl / $mod+Shift+hjkl)
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# layouts  (i3: split / tabbed / fullscreen / floating)
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'
alt-f = 'fullscreen'
alt-shift-space = 'layout floating tiling'

# workspaces 1..10  (i3: $mod+1..0 / $mod+Shift+1..0)
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'
alt-0 = 'workspace 10'
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'
alt-shift-0 = 'move-node-to-workspace 10'
alt-tab = 'workspace-back-and-forth'

# reload config  (i3: $mod+Shift+r) ; resize mode  (i3: $mod+r)
alt-shift-c = 'reload-config'
alt-r = 'mode resize'

[mode.resize.binding]
h = 'resize width -50'
j = 'resize height +50'
k = 'resize height -50'
l = 'resize width +50'
enter = 'mode main'
esc = 'mode main'
