; ============================================================================
; polybar config.ini — bar layout + modules for i3/Xorg.
;
; This file is the LAYOUT (hand-maintained). The COLORS come from
; ~/.config/polybar/colors.ini, which is a Catppuccin palette selected by
; ~/setup/apply-theme.sh (same split as i3: config = layout, colors.conf =
; palette). Switch flavor with `~/setup/apply-theme.sh <flavor>`.
;
; Icons are Nerd Font glyphs (MesloLGS Nerd Font), verified present in the font.
; Launched by ~/.config/polybar/launch.sh; CPU temp sensor path comes in via
; the POLYBAR_CPU_TEMP_PATH env var (hwmon numbers shuffle across reboots).
; ============================================================================

include-file = $HOME/.config/polybar/colors.ini

[settings]
screenchange-reload = true
pseudo-transparency = false

[bar/main]
monitor = ${env:MONITOR:}
width = 100%
height = 28pt
radius = 0
fixed-center = true

background = ${colors.base}
foreground = ${colors.text}

line-size = 3pt
border-size = 0

padding-left = 1
padding-right = 1
module-margin = 0

separator = "  "
separator-foreground = ${colors.surface1}

; font-0 = text (proportional Meslo), font-1 = icons (slightly larger baseline).
font-0 = "MesloLGS Nerd Font:size=12;2"
font-1 = "MesloLGS Nerd Font:size=13;3"

modules-left = i3 xwindow
modules-center = date
modules-right = cpu memory pulseaudio wifi netip battery tray powermenu

cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true
wm-restack = i3

; ============================================================================
; Modules
; ============================================================================

[module/i3]
type = internal/i3
pin-workspaces = true
show-urgent = true
strip-wsnumbers = false
index-sort = true
enable-click = true
enable-scroll = true
wrapping-scroll = false

; Workspace label = a state dot + the number (filled when active, hollow when not).
label-focused = %name%
label-focused-background = ${colors.mauve}
label-focused-foreground = ${colors.crust}
label-focused-padding = 1

label-visible = %name%
label-visible-foreground = ${colors.text}
label-visible-padding = 1

label-unfocused = %name%
label-unfocused-foreground = ${colors.subtext0}
label-unfocused-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.red}
label-urgent-foreground = ${colors.crust}
label-urgent-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:90:…%
label-foreground = ${colors.subtext1}

[module/date]
type = internal/date
interval = 1
date = %a %d %b
time = %H:%M
label = %{F#8aadf4}%{F-} %date%   %{F#8aadf4}%{F-} %time%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = " "
format-prefix-foreground = ${colors.green}
label = %percentage:2%%

[module/memory]
type = internal/memory
interval = 2
format-prefix = "󰍛 "
format-prefix-foreground = ${colors.yellow}
label = %percentage_used:2%%

#[module/temperature]
#type = internal/temperature
#interval = 2
#hwmon-path = ${env:POLYBAR_CPU_TEMP_PATH:}
#base-temperature = 20
#warn-temperature = 85
#units = true

#format = <ramp> <label>
#format-warn = <ramp> <label-warn>
#label = %temperature-c%
#label-warn = %temperature-c%
#label-warn-foreground = ${colors.red}

#ramp-0 = 
#ramp-1 = 
#ramp-2 = 
#ramp-foreground = ${colors.peach}

[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = false
interval = 5

format-volume = <ramp-volume> <label-volume>
label-volume = %percentage%%

label-muted =  muted
label-muted-foreground = ${colors.overlay0}

ramp-volume-0 = 
ramp-volume-1 = 
ramp-volume-2 = 
ramp-volume-foreground = ${colors.sky}

click-right = pavucontrol &

[module/wifi]
type = internal/network
interface = wlp1s0
interface-type = wireless
interval = 5

format-connected = <label-connected>
format-disconnected = <label-disconnected>

label-connected = %{F#a6da95}%{F-} %essid% %{F#8087a2}%signal%%%{F-}
label-disconnected = %{F#6e738d} offline%{F-}

[module/netip]
type = internal/network
interface = wlp1s0
interval = 5

format-connected = <label-connected>
format-disconnected =
label-connected = %{F#7dc4e4}%{F-} %local_ip%

[module/battery]
type = internal/battery
battery = BATT
adapter = ACAD
full-at = 99
low-at = 15
poll-interval = 5

format-charging = %{F#a6da95}%{F-} <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full = <ramp-capacity> <label-full>
format-low = <animation-low> <label-low>

label-charging = %percentage%%
label-discharging = %percentage%%
label-full = %percentage%%
label-low = %percentage%%
label-low-foreground = ${colors.red}

ramp-capacity-0 = 
ramp-capacity-1 = 
ramp-capacity-2 = 
ramp-capacity-3 = 
ramp-capacity-4 = 
ramp-capacity-foreground = ${colors.green}

animation-charging-0 = 
animation-charging-1 = 
animation-charging-2 = 
animation-charging-3 = 
animation-charging-4 = 
animation-charging-foreground = ${colors.green}
animation-charging-framerate = 750

animation-low-0 = 
animation-low-1 = 
animation-low-foreground = ${colors.red}
animation-low-framerate = 500

[module/tray]
type = internal/tray
tray-background = ${colors.base}

[module/powermenu]
type = custom/script
exec = echo "  "
interval = 0
format-foreground = ${colors.red}
#format-padding-right = 1
click-left = ~/.config/polybar/scripts/powermenu.sh
