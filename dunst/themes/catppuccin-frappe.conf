;-------------------------
; Catppuccin Frappé — dunst palette (colors only)
;
; Dropped into ~/.config/dunst/dunstrc.d/catppuccin.conf by ~/setup/apply-theme.sh.
; dunst loads dunstrc first, then dunstrc.d/*.conf (which override it), so these
; colors win over the hand-maintained layout in dunstrc. Same split as polybar
; (config.ini = layout, colors.ini = palette). Accent = mauve, matching i3 /
; polybar / GTK / yazi.
;--------------------------

[global]
    frame_color    = "#ca9ee6"
    separator_color = frame

[urgency_low]
    background  = "#303446"
    foreground  = "#a5adce"
    frame_color = "#51576d"

[urgency_normal]
    background  = "#303446"
    foreground  = "#c6d0f5"
    frame_color = "#ca9ee6"

[urgency_critical]
    background  = "#303446"
    foreground  = "#c6d0f5"
    frame_color = "#e78284"
